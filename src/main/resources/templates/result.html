<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>OIDC Result</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <link href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css" rel="stylesheet"/>

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

    <script>
    async function copyPreviousCode(button) {
        const code = button.parentElement.querySelector("code").innerText;

        await navigator.clipboard.writeText(code);

        const original = button.innerText;
        button.innerText = "Copied";

        setTimeout(() => {
            button.innerText = original;
        }, 1200);
    }
		</script>

</head>
<body>
<main class="container wide">
    <h1>OIDC Login Result</h1>

    <form th:action="@{/logout}" method="post" class="logout">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
    </form>

    <section class="card">
        <h2>Issuer</h2>
        <pre><code class="language-plaintext" th:text="${tokenView.issuer}"></code></pre>

        <h2>Scopes</h2>
        <pre><code class="language-plaintext" th:text="${tokenView.scopes}"></code></pre>
    </section>

    <section class="card">
        <h2>Access Token</h2>

        <div th:unless="${tokenView.hideTokens}" class="code-box">
            <pre><code class="language-plaintext" th:text="${tokenView.accessToken}"></code></pre>
        </div>

        <h3>Decoded Access Token</h3>
        <pre><code class="language-json" th:text="${tokenView.decodedAccessToken}"></code></pre>
    </section>

    <section class="card">
        <h2>ID Token</h2>
        <div th:unless="${tokenView.hideTokens}" class="code-box">
            <pre><code class="language-plaintext" th:text="${tokenView.idToken}"></code></pre>
        </div>

        <h3>Decoded ID Token</h3>
        <pre><code class="language-json" th:text="${tokenView.decodedIdToken}"></code></pre>
    </section>

    <section class="card">
        <h2>Refresh Token</h2>
        <div th:unless="${tokenView.hideTokens}" class="code-box">
            <pre><code class="language-plaintext" th:text="${tokenView.refreshToken}"></code></pre>
        </div>

        <h3>Decoded Refresh Token</h3>
        <pre><code class="language-json" th:text="${tokenView.decodedRefreshToken}"></code></pre>
    </section>

    <section class="card">
        <h2>UserInfo</h2>
        <pre><code class="language-json" th:text="${tokenView.userInfo}"></code></pre>
    </section>

    <section class="card">
        <h2>Introspection</h2>
        <pre><code class="language-json" th:text="${tokenView.introspection}"></code></pre>
    </section>
</main>
</body>
</html>
